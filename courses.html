<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Learning - Khóa Học & Sự Kiện</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a class="nav-logo" href="index.html">IT Learning</a>
            <ul class="nav-menu">
                <li><a class="nav-link" href="index.html">Trang Chủ</a></li>
                <li><a class="nav-link active" href="courses.html">Khóa Học & Sự Kiện</a></li>
                <li><a class="nav-link" href="register.html">Đăng Ký</a></li>
                <li><a class="nav-link" href="registrations.html">Đã Đăng Ký</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <h2 style="margin-bottom: 25px;">Danh Sách Khóa Học & Sự Kiện</h2>

        <div class="filter-card">
            <div class="form-group">
                <label>Tìm kiếm theo tên</label>
                <input type="text" id="search-input" class="form-control" placeholder="Nhập từ khóa...">
            </div>
            <div class="form-group">
                <label>Danh mục</label>
                <select id="category-filter" class="form-control">
                    <option value="">Tất cả danh mục</option>
                    <option value="Frontend">Frontend</option>
                    <option value="Backend">Backend</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Design">Design</option>
                </select>
            </div>
            <div class="form-group">
                <label>Cấp độ</label>
                <select id="level-filter" class="form-control">
                    <option value="">Tất cả cấp độ</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>
            <button id="btn-reset" class="btn btn-secondary">Làm Mới</button>
        </div>

        <div class="grid-container" id="courses-container"></div>
    </main>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <div class="modal-header">
                <h3 id="modal-title" style="color: var(--primary-color);">Tên Khóa Học</h3>
            </div>
            <img id="modal-img" src="" class="modal-img" alt="Cover">
            <div style="margin-bottom: 15px;">
                <span id="modal-category" class="badge badge-cat">Danh mục</span>
                <span id="modal-level" class="badge badge-lvl">Cấp độ</span>
            </div>
            <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 15px;">Ngày tổ chức: <b id="modal-date" style="color:#1e293b"></b></p>
            <h4 style="margin-bottom: 5px; font-size: 1rem;">Mô tả ngắn:</h4>
            <p id="modal-description" style="color: #475569; margin-bottom: 15px; font-size: 0.95rem;"></p>
            <h4 style="margin-bottom: 5px; font-size: 1rem;">Nội dung chi tiết:</h4>
            <p id="modal-detail" style="color: #1e293b; margin-bottom: 25px; font-size: 0.95rem;"></p>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn btn-secondary" id="modal-cancel-btn">Đóng</button>
                <a class="btn btn-primary" id="modal-register-btn" href="register.html">Đăng Ký Tham Gia</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Đại học Bình Dương - Phân hiệu Cà Mau</p>
    </footer>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
